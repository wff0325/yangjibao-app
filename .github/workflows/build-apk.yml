name: Build APK (Full Auto)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node
        uses: actions/setup-node@v4
        with:
          node-version: 16

- name: ☕ Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ===== 新增：修复 DCloud 幽灵版本问题 =====
      - name: 🔧 Fix uni-app Phantom Version
        run: |
          # 1. 删掉 lock 文件（防止里面有死掉的旧淘宝镜像域名 registry.npm.taobao.org 导致卡死）
          rm -f package-lock.json
          
          # 2. 动态查询 npm 仓库，获取 @dcloudio/uni-app 真正存在的最新 Vue2 版本
          LATEST_VUE2=$(npm show @dcloudio/uni-app versions | grep -o "2\.[0-9a-zA-Z.-]*" | tail -n 1)
          echo "在 NPM 找到最新真实可用版本为: $LATEST_VUE2"
          
          # 3. 把 package.json 里所有报 404 的 2.0.0-32920211029001 全部替换为这个真实版本
          sed -i "s/2.0.0-32920211029001/$LATEST_VUE2/g" package.json

      # ===== 正常执行安装 =====
      - name: 📦 Install
        run: npm install

      - name: 🏗️ Build H5
        run: npm run build:h5

      # ===== 自动安装 Capacitor 相关 Package 并初始化 =====
      - name: ⚙️ Init Capacitor
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init demo com.demo.app --web-dir=dist/build/h5
          npx cap add android

      - name: 🔄 Sync
        run: npx cap sync android

      # ===== 自动生成 keystore（关键）=====
      - name: 🔐 Generate keystore
        run: |
          keytool -genkeypair -v \
          -keystore android/app/release.keystore \
          -alias demo \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass 123456 \
          -keypass 123456 \
          -dname "CN=demo, OU=dev, O=dev, L=dev, S=dev, C=US"

      # ===== 写签名配置 =====
      - name: ✍️ Configure signing
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=demo
          MYAPP_UPLOAD_STORE_PASSWORD=123456
          MYAPP_UPLOAD_KEY_PASSWORD=123456
          EOF

      # ===== 修改 build.gradle =====
      - name: 🔧 Patch gradle
        run: |
          sed -i '/buildTypes {/a \
              signingConfigs {\n\
                  release {\n\
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)\n\
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD\n\
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS\n\
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD\n\
                  }\n\
              }' android/app/build.gradle

          sed -i 's/buildTypes {/buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }/g' android/app/build.gradle

      - name: 📦 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: 🚀 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
