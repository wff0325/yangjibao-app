name: Build APK (Full Auto)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: ☕ Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ===== 自动修复 DCloud 版本冲突 (升级为 Node.js 精确修改版) =====
      - name: 🔧 Fix uni-app Dependencies
        run: |
          rm -f package-lock.json
          
          # 1. 动态查询 npm 仓库，获取真正存在的最新 2.x 版本
          LATEST_VUE2=$(npm show @dcloudio/uni-app versions --json | grep -o '"2\.[0-9a-zA-Z.-]*"' | sed 's/"//g' | tail -n 1)
          echo "在 NPM 找到最新真实可用版本为: $LATEST_VUE2"
          
          # 2. 使用内嵌 Node.js 脚本，把 package.json 里所有 @dcloudio 相关的包强制对齐版本
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = '$LATEST_VUE2';
            const ignoreList =['@dcloudio/types', '@dcloudio/uni-helper-json']; // 这两个包版本独立，需忽略['dependencies', 'devDependencies'].forEach(type => {
              if (pkg[type]) {
                for (let key in pkg[type]) {
                  if (key.startsWith('@dcloudio/') && !ignoreList.includes(key)) {
                    pkg[type][key] = version;
                  }
                }
              }
            });
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          
          echo "✅ package.json 中的 @dcloudio 依赖已全部强行对齐！"

      # ===== 安装依赖 (关键：必须加 --legacy-peer-deps 模拟旧版 HBuilderX 环境) =====
      - name: 📦 Install
        run: npm install --legacy-peer-deps

      # ===== 编译前端 H5 产物 =====
      - name: 🏗️ Build H5
        run: npm run build:h5

      # ===== 自动安装 Capacitor 相关 Package 并初始化 =====
      - name: ⚙️ Init Capacitor
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android --legacy-peer-deps
          npx cap init demo com.demo.app --web-dir=dist/build/h5
          npx cap add android

      - name: 🔄 Sync
        run: npx cap sync android

      # ===== 自动生成 keystore 签名文件 =====
      - name: 🔐 Generate keystore
        run: |
          keytool -genkeypair -v \
          -keystore android/app/release.keystore \
          -alias demo \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass 123456 \
          -keypass 123456 \
          -dname "CN=demo, OU=dev, O=dev, L=dev, S=dev, C=US"

      # ===== 将签名配置写入 Android gradle.properties =====
      - name: ✍️ Configure signing
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=demo
          MYAPP_UPLOAD_STORE_PASSWORD=123456
          MYAPP_UPLOAD_KEY_PASSWORD=123456
          EOF

      # ===== 动态修改 build.gradle 以支持 Release 签名打包 =====
      - name: 🔧 Patch gradle
        run: |
          sed -i '/buildTypes {/a \
              signingConfigs {\n\
                  release {\n\
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)\n\
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD\n\
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS\n\
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD\n\
                  }\n\
              }' android/app/build.gradle

          sed -i 's/buildTypes {/buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }/g' android/app/build.gradle

      # ===== 编译 APK =====
      - name: 📦 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # ===== 上传 APK 为 Artifact (供页面手动下载) =====
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # ===== 发布到 Github Releases (自动创建 Release 版本) =====
      - name: 🚀 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
