name: Build APK (Full Auto)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: ☕ Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ===== 自动修复 DCloud 幽灵版本 404 报错 =====
      - name: 🔧 Fix uni-app Phantom Version
        run: |
          # 1. 删掉 lock 文件，强制根据 package.json 重新解析最新包，避免旧淘宝源卡死
          rm -f package-lock.json
          
          # 2. 动态查询 npm 仓库，获取 @dcloudio/uni-app 真正存在的最新 2.x 版本
          LATEST_VUE2=$(npm show @dcloudio/uni-app versions --json | grep -o '"2\.[0-9a-zA-Z.-]*"' | sed 's/"//g' | tail -n 1)
          echo "在 NPM 找到最新真实可用版本为: $LATEST_VUE2"
          
          # 3. 批量将 package.json 里报错的 2.0.0-32920211029001 替换为该真实版本
          sed -i "s/2.0.0-32920211029001/$LATEST_VUE2/g" package.json

      # ===== 安装项目依赖 =====
      - name: 📦 Install
        run: npm install

      # ===== 编译前端 H5 产物 =====
      - name: 🏗️ Build H5
        run: npm run build:h5

      # ===== 自动安装 Capacitor 相关 Package 并初始化 =====
      - name: ⚙️ Init Capacitor
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init demo com.demo.app --web-dir=dist/build/h5
          npx cap add android

      - name: 🔄 Sync
        run: npx cap sync android

      # ===== 自动生成 keystore 签名文件 =====
      - name: 🔐 Generate keystore
        run: |
          keytool -genkeypair -v \
          -keystore android/app/release.keystore \
          -alias demo \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass 123456 \
          -keypass 123456 \
          -dname "CN=demo, OU=dev, O=dev, L=dev, S=dev, C=US"

      # ===== 将签名配置写入 Android gradle.properties =====
      - name: ✍️ Configure signing
        run: |
          cat >> android/gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=demo
          MYAPP_UPLOAD_STORE_PASSWORD=123456
          MYAPP_UPLOAD_KEY_PASSWORD=123456
          EOF

      # ===== 动态修改 build.gradle 以支持 Release 签名打包 =====
      - name: 🔧 Patch gradle
        run: |
          sed -i '/buildTypes {/a \
              signingConfigs {\n\
                  release {\n\
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)\n\
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD\n\
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS\n\
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD\n\
                  }\n\
              }' android/app/build.gradle

          sed -i 's/buildTypes {/buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }/g' android/app/build.gradle

      # ===== 编译 APK =====
      - name: 📦 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      # ===== 上传 APK 为 Artifact (供页面手动下载) =====
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/release/app-release.apk

      # ===== 发布到 Github Releases (自动创建 Release 版本) =====
      - name: 🚀 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
