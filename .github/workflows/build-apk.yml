name: Auto Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Tools
        run: |
          # 不再依赖全局安装，直接通过 npx 调用
          npm install miniprogram-to-uniapp

      - name: Convert Mini-Program to Uni-app
        run: |
          # 使用 npx 强制运行转换工具，并指定输出目录为 'converted'
          npx miniprogram-to-uniapp -i . -o ./converted

      - name: Setup Android Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor
        run: |
          cd converted
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # 初始化 Capacitor，指定 web 目录为当前目录
          npx cap init yangjibao com.yangjibao.app --web-dir .
          npx cap add android

      - name: Build Android APK
        run: |
          cd converted/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yangjibao-release-apk
          # 匹配生成的 release apk 文件
          path: converted/android/app/build/outputs/apk/release/*.apk
