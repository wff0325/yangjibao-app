name: Build Android APK (Node 20 & Open Source)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 使用你要求的 Node 20

      - name: Install Converter
        # 使用 uni-app 的转换工具，它在 Node 20 上兼容性最好
        run: |
          npm install -g miniprogram-to-uniapp
          # 修复该工具在 Linux 环境下的权限问题
          chmod +x $(which w2u) || true

      - name: Convert Native WXML to Web Project
        # 将你的原生小程序代码转换为一个可跨平台运行的项目
        run: |
          # w2u 是 miniprogram-to-uniapp 的缩写
          # 我们把转换后的代码直接放在 'converted_project' 文件夹
          npx miniprogram-to-uniapp -i . -o ./converted_project

      - name: Setup Java & Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Android Wrapper (Capacitor)
        # Capacitor 是目前最流行的开源 App 容器，完美支持 Node 20
        run: |
          cd converted_project
          # 初始化 package.json 防止报错
          if [ ! -f package.json ]; then echo '{"name": "yangjibao", "version": "1.0.0"}' > package.json; fi
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # 初始化安卓工程
          npx cap init yangjibao com.yangjibao.app --web-dir .
          npx cap add android
          
      - name: Build APK
        run: |
          # 进入安卓目录并利用 Gradle 编译
          cd converted_project/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: yangjibao-apk
          path: converted_project/android/app/build/outputs/apk/debug/*.apk
