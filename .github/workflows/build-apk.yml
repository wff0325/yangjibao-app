name: Build Android APK (Taro Flow)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Taro CLI
        run: |
          # Taro 是京东出品的成熟框架，比之前的工具更稳定
          npm install -g @tarojs/cli

      - name: Convert Mini-Program to Taro
        run: |
          # 使用 Taro 的转换引擎，它会自动处理 WXML/WXSS
          # 它会生成一个名为 taroConvert 的文件夹
          taro convert

      - name: Install Project Dependencies
        run: |
          cd taroConvert
          npm install --legacy-peer-deps

      - name: Setup Android Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build React Native Android (Taro Internal)
        run: |
          cd taroConvert
          # 使用 Capacitor 作为 App 容器
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init yangjibao com.yangjibao.app --web-dir ./dist
          # 先编译出 Web 资源包
          npm run build:h5 || true 
          npx cap add android
          npx cap sync android

      - name: Build Release APK
        run: |
          cd taroConvert/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yangjibao-release-apk
          path: taroConvert/android/app/build/outputs/apk/release/*.apk
