name: Build Android APK (Hotfix Version)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Patch Converter
        run: |
          # 1. 安装工具
          npm install miniprogram-to-uniapp
          
          # 2. 【核心修复】手动补齐工具漏掉的文件，解决 MODULE_NOT_FOUND 报错
          MOD_PATH="node_modules/miniprogram-to-uniapp/src/page/script/vantComponent"
          mkdir -p $MOD_PATH
          echo "module.exports = { transform: function(a){return a} };" > $MOD_PATH/VantComponent-transformer.js
          echo "补丁已应用：已手动创建缺失的 VantComponent-transformer 模块"

      - name: Convert Mini-Program
        run: |
          # 执行转换，即使你的代码里没用 Vant，现在的工具也不会报错了
          npx miniprogram-to-uniapp -i . -o ./converted_project

      - name: Setup Java & Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android App via Capacitor
        run: |
          cd converted_project
          # 创建一个基础的 package.json
          echo '{"name": "yangjibao", "version": "1.0.0", "dependencies": {}}' > package.json
          
          # 安装移动端外壳
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 初始化 Capacitor (web-dir 指向转换后的根目录)
          npx cap init yangjibao com.yangjibao.app --web-dir .
          npx cap add android
          
          # 同步代码到安卓工程
          npx cap sync android

      - name: Compile APK
        run: |
          cd converted_project/android
          chmod +x gradlew
          # 先打 Debug 包，不需要配置签名即可安装
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yangjibao-android-apk
          path: converted_project/android/app/build/outputs/apk/debug/*.apk
